name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

# Public frontend build env. Set these in GitHub repo Settings -> Secrets and variables -> Actions -> Variables.
env:
  NODE_ENV: production
  GITHUB_PROJECT_TOPIC: ${{ vars.GITHUB_PROJECT_TOPIC || 'deployrocket-project' }}
  GITHUB_STATE_BRANCH: ${{ vars.GITHUB_STATE_BRANCH || 'deployrocket-state' }}

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Write frontend env
        env:
          FRONTEND_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
        run: |
          if [ -z "${FRONTEND_API_BASE_URL}" ]; then
            echo "::warning::VITE_API_BASE_URL is empty. The GitHub Pages frontend will show setup instructions instead of GitHub sign-in."
          fi
          printf "VITE_API_BASE_URL=%s\n" "${FRONTEND_API_BASE_URL}" > .env.production

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
